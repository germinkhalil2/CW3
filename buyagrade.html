<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy a Grade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    <section class="card">
        <h1>Exercise 2: Buy a Grade Form</h1>
        <p class="intro">Fill out the form completely to submit your request.</p>

        <form action="sucker.php" method="post" class="form-grid">
            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" required>
            </div>

            <div class="form-group">
                <label for="section">Section</label>
                <select id="section" name="section" required>
                    <option value="">Select a section</option>
                    <option>MA</option>
                    <option>MB</option>
                    <option>MC</option>
                    <option>MD</option>
                    <option>ME</option>
                    <option>MF</option>
                    <option>MG</option>
                    <option>MH</option>
                </select>
            </div>

            <div class="form-group full">
                <label for="cardnumber">Credit Card Number</label>
                <input id="cardnumber" type="text" name="cardnumber" required>
            </div>

            <fieldset class="form-group full">
                <legend>Credit Card Type</legend>

                <label class="radio-option">
                    <input type="radio" name="cardtype" value="visa" required>
                    Visa
                </label>

                <label class="radio-option">
                    <input type="radio" name="cardtype" value="mastercard">
                    MasterCard
                </label>
            </fieldset>

            <div class="full">
                <button type="submit">I am a giant sucker.</button>
            </div>
        </form>
    </section>
</main>

</body>
</html>
