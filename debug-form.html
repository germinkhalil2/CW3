<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    <section class="card">
        <h1>Exercise 1: Multi-Select Form Fix</h1>

        <form action="debug-form-handler.php" method="post" class="form-grid">
            <div class="form-group">
                <label for="visitor_name">Your Name</label>
                <input id="visitor_name" name="visitor_name" type="text" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>

            <div class="form-group full">
                <label for="options">Optional Features</label>
                <select id="options" name="options[]" size="6" multiple required>
                    <option>Chat</option>
                    <option>Email</option>
                    <option>File transfer</option>
                    <option>Directory</option>
                    <option>Shell</option>
                    <option>Remote control</option>
                </select>
            </div>

            <div class="full">
                <button type="submit">Sign Up</button>
            </div>
        </form>
    </section>
</main>

</body>
</html>
